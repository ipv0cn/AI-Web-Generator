<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Web Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0c29;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      flex-direction: column;
      gap: 20px;
    }

    .bar {
      width: 100%;
      max-width: 640px;
      display: flex;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .bar input {
      flex: 1;
      padding: 14px 18px;
      background: transparent;
      border: none;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .bar input::placeholder {
      color: #555;
    }

    .bar button {
      padding: 14px 22px;
      border: none;
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .bar button:hover {
      opacity: 0.85;
    }

    .hint {
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    .hint code {
      color: #888;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <div class="bar">
    <input type="text" id="pathInput" placeholder="/baidu.com" onkeydown="if(event.key==='Enter')go()" autofocus>
    <button onclick="go()">前往</button>
  </div>
  <div class="hint">输入 <code>/目标站点/路径</code> 即可浏览<br>如 <code>/baidu.com</code>、<code>/github.com/login</code></div>
  <script>
    function go() {
      var v = document.getElementById('pathInput').value.trim();
      if (v) location.href = (v.startsWith('/') ? '' : '/') + v;
    }
  </script>
</body>

</html>
